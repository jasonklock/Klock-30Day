<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Klock 30-Day Cut</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#080808;--surface:#111;--surface2:#161616;--border:#1c1c1c;--border2:#2a2a2a;
  --accent:#E8FF00;--text:#efefef;--muted:#4a4a4a;--muted2:#777;
  --red:#FF3B3B;--blue:#40B6E9;--green:#00E87A;--orange:#FF8C00;--purple:#c084fc;
}
body{background:var(--bg);color:var(--text);font-family:'Courier New',monospace;min-height:100vh;padding-bottom:80px;}
input,textarea,select{background:var(--surface);border:1px solid var(--border2);color:var(--text);font-family:'Courier New',monospace;border-radius:2px;}
input:focus,textarea:focus,select:focus{outline:none;border-color:var(--accent);}
button{cursor:pointer;font-family:'Courier New',monospace;border-radius:2px;}

/* HEADER */
.hdr{position:sticky;top:0;background:var(--bg);border-bottom:1px solid var(--border);padding:14px 16px 10px;z-index:100;}
.hdr-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;}
.hdr-label{font-size:8px;letter-spacing:4px;color:var(--muted);display:flex;align-items:center;gap:8px;margin-bottom:3px;}
.save-pill{font-size:7px;letter-spacing:2px;padding:2px 6px;border-radius:2px;display:none;}
.save-pill.saved{background:#00200f;color:var(--green);border:1px solid var(--green);display:inline;}
.day-name{font-size:24px;font-weight:900;font-family:Georgia,serif;line-height:1;}
.day-lbl{font-size:12px;font-weight:700;margin-top:2px;}
.day-meta{text-align:right;}
.pct{font-size:24px;font-weight:900;line-height:1.1;}
.pct-sub{font-size:9px;color:var(--muted);}
.prog-bar{background:var(--border);height:3px;border-radius:2px;margin-bottom:10px;}
.prog-fill{height:100%;border-radius:2px;transition:width .3s;}

/* NAV ARROWS */
.nav-row{display:flex;gap:6px;margin-bottom:8px;}
.nav-btn{background:none;border:1px solid var(--border2);color:var(--text);padding:6px 12px;font-size:14px;flex-shrink:0;}
.nav-btn:disabled{color:var(--muted);cursor:default;}
.nav-mid{flex:1;font-size:8px;letter-spacing:2px;color:var(--text);}

/* TAB BAR */
.tabs{display:flex;overflow-x:auto;border-bottom:1px solid var(--border);margin:0 -16px;padding:0 16px;}
.tab{background:none;border:none;border-bottom:2px solid transparent;color:var(--muted);padding:8px 14px;font-size:9px;letter-spacing:2px;white-space:nowrap;flex-shrink:0;}
.tab.active{color:var(--accent);border-bottom-color:var(--accent);}

/* BANNER */
.banner{margin:12px 16px 0;padding:10px 12px;font-size:11px;line-height:1.6;border-radius:2px;}
.banner.red{background:#1a0a0a;border:1px solid var(--red);color:var(--red);}
.banner.green{background:#0a1a0a;border:1px solid var(--green);color:var(--green);}
.banner.yellow{background:#0d0d00;border:1px solid var(--accent);color:var(--accent);}

/* CHECKLIST */
.cl{padding:12px 16px 20px;}
.item{display:flex;gap:10px;align-items:flex-start;padding:10px 0;border-bottom:1px solid var(--border);cursor:pointer;-webkit-tap-highlight-color:transparent;transition:opacity .15s;}
.item.done{opacity:.38;}
.cb{width:16px;height:16px;border:1px solid var(--border2);flex-shrink:0;margin-top:2px;display:flex;align-items:center;justify-content:center;transition:all .15s;}
.ck{font-size:10px;font-weight:900;color:var(--bg);line-height:1;}
.im{display:flex;gap:8px;align-items:center;margin-bottom:2px;flex-wrap:wrap;}
.cat{font-size:8px;letter-spacing:2px;flex-shrink:0;}
.tm{font-size:8px;color:var(--muted);}
.itxt{font-size:12px;line-height:1.5;color:#bbb;}
.itxt.b{font-size:13px;font-weight:700;color:var(--text);}
.item.done .itxt{text-decoration:line-through;}

/* COMPLETE */
.done-box{margin:16px 0;padding:18px;background:#001a0a;border:1px solid var(--green);text-align:center;}
.done-chk{font-size:20px;margin-bottom:6px;}
.done-ttl{font-size:13px;font-weight:900;letter-spacing:2px;margin-bottom:4px;}
.done-sub{font-size:10px;color:var(--muted);margin-bottom:12px;}
.next-btn{background:var(--green);border:none;color:var(--bg);padding:9px 22px;font-size:10px;letter-spacing:2px;font-weight:900;}

/* CALENDAR */
.cal-wrap{padding:12px 16px;border-bottom:1px solid var(--border);background:#0d0d0d;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;}
.cal-hd{font-size:7px;letter-spacing:1px;color:var(--muted);text-align:center;padding-bottom:3px;}
.cal-cell{aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;border:1px solid var(--border);background:var(--surface);border-radius:2px;position:relative;}
.cal-dot{width:4px;height:4px;border-radius:50%;margin-bottom:1px;}
.cal-n{font-size:8px;}
.cal-bar{position:absolute;bottom:2px;left:2px;right:2px;height:2px;background:var(--border);border-radius:1px;}
.cal-fill{height:100%;border-radius:1px;background:var(--accent);}
.cal-done{position:absolute;bottom:1px;font-size:6px;color:var(--green);}
.cal-leg{margin-top:8px;display:flex;gap:10px;flex-wrap:wrap;font-size:8px;color:var(--muted);}

/* SECTION PANELS */
.panel{padding:14px 16px;}
.sec-hd{font-size:8px;letter-spacing:3px;color:var(--muted);margin-bottom:12px;padding-bottom:6px;border-bottom:1px solid var(--border);}
.card{background:var(--surface);border:1px solid var(--border);padding:14px;margin-bottom:10px;border-radius:2px;}
.card-title{font-size:11px;font-weight:700;color:var(--text);margin-bottom:8px;}
.card-sub{font-size:10px;color:var(--muted);margin-bottom:6px;}

/* WEIGHT LOG */
.ex-row{display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap;}
.ex-name{font-size:11px;color:var(--text);flex:1;min-width:140px;}
.ex-inputs{display:flex;gap:6px;}
.ex-field{display:flex;flex-direction:column;align-items:center;gap:2px;}
.ex-field label{font-size:7px;letter-spacing:2px;color:var(--muted);}
.ex-field input{width:60px;padding:6px 4px;text-align:center;font-size:12px;font-weight:700;color:var(--accent);}

/* FOOD JOURNAL */
.food-entry{background:var(--surface2);border:1px solid var(--border);padding:12px;margin-bottom:8px;border-radius:2px;position:relative;}
.food-time{font-size:9px;letter-spacing:2px;color:var(--accent);margin-bottom:4px;}
.food-desc{font-size:12px;color:var(--text);line-height:1.5;}
.food-note{font-size:11px;color:var(--muted);margin-top:4px;}
.del-btn{position:absolute;top:8px;right:8px;background:none;border:none;color:var(--muted);font-size:14px;padding:2px 6px;}
.del-btn:hover{color:var(--red);}
.add-form{background:var(--surface);border:1px solid var(--border2);padding:12px;border-radius:2px;margin-top:10px;}
.add-row{display:flex;gap:8px;margin-bottom:8px;flex-wrap:wrap;}
.add-row input,.add-row select,.add-row textarea{padding:8px;font-size:12px;}
.add-row input[type=time]{width:100px;}
.add-row select{width:130px;}
.add-row textarea{width:100%;min-height:60px;resize:vertical;line-height:1.5;}
.add-btn{background:var(--accent);border:none;color:var(--bg);padding:9px 20px;font-size:10px;letter-spacing:2px;font-weight:900;width:100%;margin-top:4px;}

/* MISS LOG & NOTES */
.miss-item{border:1px solid var(--border);padding:12px;margin-bottom:8px;border-radius:2px;}
.miss-label{font-size:11px;font-weight:700;color:var(--orange);margin-bottom:6px;}
.miss-input{width:100%;padding:8px;font-size:12px;min-height:50px;resize:vertical;line-height:1.5;}
.miss-save{background:var(--surface2);border:1px solid var(--border2);color:var(--muted2);padding:5px 12px;font-size:9px;letter-spacing:2px;margin-top:6px;}
.miss-save.saved{border-color:var(--green);color:var(--green);}
.notes-area{width:100%;padding:10px;font-size:12px;min-height:120px;resize:vertical;line-height:1.6;margin-bottom:10px;}
.save-notes-btn{background:var(--accent);border:none;color:var(--bg);padding:9px 20px;font-size:10px;letter-spacing:2px;font-weight:900;}

/* ANALYTICS */
.stat-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:16px;}
.stat-card{background:var(--surface);border:1px solid var(--border);padding:14px;text-align:center;border-radius:2px;}
.stat-num{font-size:28px;font-weight:900;font-family:Georgia,serif;line-height:1;}
.stat-lbl{font-size:8px;letter-spacing:2px;color:var(--muted);margin-top:4px;}
.cat-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.cat-row-lbl{font-size:10px;color:var(--text);width:80px;flex-shrink:0;}
.cat-bar-wrap{flex:1;background:var(--border);height:8px;border-radius:4px;}
.cat-bar-fill{height:100%;border-radius:4px;transition:width .5s;}
.cat-pct{font-size:10px;font-weight:700;width:36px;text-align:right;flex-shrink:0;}
.heatmap{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:16px;}
.hm-cell{aspect-ratio:1;border-radius:2px;display:flex;align-items:center;justify-content:center;font-size:7px;color:var(--muted);}
.miss-freq{margin-bottom:6px;padding:10px;background:var(--surface);border:1px solid var(--border);border-radius:2px;}
.miss-freq-name{font-size:11px;color:var(--text);margin-bottom:4px;}
.miss-freq-bar{height:4px;background:var(--border);border-radius:2px;margin-bottom:2px;}
.miss-freq-fill{height:100%;border-radius:2px;background:var(--orange);}
.miss-freq-count{font-size:9px;color:var(--muted);}

/* WEEKLY JOURNAL */
.journal{background:#0a0a0a;border:1px solid var(--border2);margin-top:16px;border-radius:2px;}
.jnl-hdr{padding:12px 14px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;}
.jnl-lbl{font-size:8px;letter-spacing:3px;color:var(--muted);}
.jnl-ttl{font-size:12px;font-weight:900;color:var(--accent);margin-top:2px;}
.jnl-avg{text-align:right;}
.jnl-avg-n{font-size:18px;font-weight:900;color:var(--accent);line-height:1;}
.jnl-chg{font-size:10px;margin-top:2px;}
.jnl-sec{padding:12px 14px;border-bottom:1px solid var(--border);}
.jnl-sec-lbl{font-size:8px;letter-spacing:3px;color:var(--muted);margin-bottom:8px;}
.w-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;}
.w-day label{font-size:7px;color:var(--muted);display:block;text-align:center;margin-bottom:2px;}
.w-day input{width:100%;padding:5px 2px;font-size:11px;text-align:center;}
.whoop-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.whoop-info{flex:1;}
.whoop-name{font-size:11px;font-weight:700;}
.whoop-tip{font-size:9px;color:var(--muted);margin-top:1px;}
.whoop-in{width:64px;padding:7px 4px;font-size:13px;font-weight:900;color:var(--accent);text-align:center;flex-shrink:0;}
.jnl-notes{width:100%;padding:8px;font-size:11px;min-height:70px;resize:vertical;line-height:1.6;}
.jnl-foot{padding:10px 14px;display:flex;justify-content:flex-end;}
.jnl-save{background:var(--accent);border:none;color:var(--bg);padding:9px 20px;font-size:10px;letter-spacing:2px;font-weight:900;}
.jnl-save.saved{background:var(--green);}
</style>
</head>

function getCatStats(){
  const cats={};
  DAYS.forEach(day=>{
    const items=buildItems(day);
    items.forEach(it=>{
      if(!cats[it.cat])cats[it.cat]={total:0,done:0};
      cats[it.cat].total++;
      if(S.checked[`${day.n}_${it.id}`])cats[it.cat].done++;
    });
  });
  return cats;
}
function getStreak(){
  let streak=0;
  for(let i=0;i<S.dayIdx;i++){
    const day=DAYS[i];
    const items=buildItems(day);
    const pct=items.length?items.filter(it=>S.checked[`${day.n}_${it.id}`]).length/items.length:0;
    if(pct>=0.8)streak++;else streak=0;
  }
  return streak;
}
function getMissFreq(){
  const freq={};
  DAYS.forEach(day=>{
    const items=buildItems(day);
    items.filter(it=>it.bold&&!S.checked[`${day.n}_${it.id}`]).forEach(it=>{
      const k=it.text.split('—')[0].split('↳')[0].trim().substring(0,40);
      freq[k]=(freq[k]||0)+1;
    });
  });
  return Object.entries(freq).filter(([,v])=>v>0).sort((a,b)=>b[1]-a[1]).slice(0,8);
}
function getOverallPct(){
  let total=0,done=0;
  for(let i=0;i<=S.dayIdx;i++){
    const day=DAYS[i];
    const items=buildItems(day);
    total+=items.length;
    done+=items.filter(it=>S.checked[`${day.n}_${it.id}`]).length;
  }
  return total?Math.round(done/total*100):0;
}

    const col=catColors[cat]||'#888';
    return `<div class="cat-row">
      <div class="cat-row-lbl" style="color:${col}">${CAT[cat]?.label||cat}</div>
      <div class="cat-bar-wrap"><div class="cat-bar-fill" style="width:${p}%;background:${col}"></div></div>
      <div class="cat-pct" style="color:${col}">${p}%</div>
    </div>`;
  }).join('');

  const heatmap=DAYS.map((d,i)=>{
    const its=buildItems(d);
    const dn=its.filter(it=>!!S.checked[`${d.n}_${it.id}`]).length;
    const p=its.length?dn/its.length:0;
    const future=i>S.dayIdx;
    const bg=future?'var(--surface)':p===0?'#1a0000':p<0.5?'#2d1500':p<0.8?'#1a2d00':p===1?'#003300':'#0d2000';
    return `<div class="hm-cell" style="background:${bg}" title="Day ${d.n}: ${Math.round(p*100)}%">${future?'':Math.round(p*100)}</div>`;
  }).join('');

  const missRows=missFreq.map(([name,count])=>`
    <div class="miss-freq">
      <div class="miss-freq-name">${name}</div>
      <div class="miss-freq-bar"><div class="miss-freq-fill" style="width:${Math.min(count/3*100,100)}%"></div></div>
      <div class="miss-freq-count">Missed ${count} time${count!==1?'s':''} so far</div>
    </div>`).join('');

  return `<div class="panel">
    <div class="sec-hd">30-DAY ANALYTICS</div>
    <div class="stat-grid">
      <div class="stat-card"><div class="stat-num" style="color:var(--accent)">${overall}%</div><div class="stat-lbl">OVERALL COMPLETION</div></div>
      <div class="stat-card"><div class="stat-num" style="color:var(--green)">${streak}</div><div class="stat-lbl">DAY STREAK (80%+)</div></div>
      <div class="stat-card"><div class="stat-num" style="color:var(--blue)">${daysLogged}</div><div class="stat-lbl">DAYS LOGGED</div></div>
      <div class="stat-card"><div class="stat-num" style="color:var(--orange)">${30-daysLogged}</div><div class="stat-lbl">DAYS REMAINING</div></div>
    </div>
    <div class="sec-hd">COMPLETION BY CATEGORY</div>
    <div style="margin-bottom:16px">${catRows}</div>
    <div class="sec-hd">30-DAY HEATMAP</div>
    <div style="font-size:9px;color:var(--muted);margin-bottom:8px">Each cell = one day. Darker green = higher completion.</div>
    <div class="heatmap" style="margin-bottom:16px">${heatmap}</div>
    ${missFreq.length?`<div class="sec-hd">WEAK SPOTS — MOST MISSED ITEMS</div><div style="font-size:11px;color:var(--muted2);margin-bottom:10px">Patterns don't lie. These are your holes.</div>${missRows}`:'<div class="sec-hd">WEAK SPOTS</div><div style="font-size:11px;color:var(--muted2)">Keep logging — patterns will surface here after a few days.</div>'}
  </div>`;
}

function renderJournal(weekNum){
  const key=`week_${weekNum}`;
  const e=S.journal[key]||{};
  const wdays=['mon','tue','wed','thu','fri','sat','sun'];
  const wVals=wdays.map(d=>parseFloat(e[`w_${d}`]||'')).filter(v=>!isNaN(v));
  const avg=wVals.length?(wVals.reduce((a,b)=>a+b,0)/wVals.length).toFixed(1):null;
  const prevKey=`week_${weekNum-1}`;const pe=S.journal[prevKey]||{};
  const pVals=wdays.map(d=>parseFloat(pe[`w_${d}`]||'')).filter(v=>!isNaN(v));
  const prevAvg=pVals.length?pVals.reduce((a,b)=>a+b,0)/pVals.length:null;
  const change=avg&&prevAvg?(parseFloat(avg)-prevAvg).toFixed(1):null;
  const wInputs=wdays.map(d=>`<div class="w-day"><label>${d.toUpperCase()}</label><input type="number" step="0.1" value="${e[`w_${d}`]||''}" placeholder="—" onchange="jSet(${weekNum},'w_${d}',this.value)"></div>`).join('');
  const wInputs2=WHOOP_FIELDS.map(f=>`<div class="whoop-row"><div class="whoop-info"><div class="whoop-name">${f.label} <span style="font-size:8px;color:var(--muted)">${f.unit?`(${f.unit})`:''}</span></div><div class="whoop-tip">${f.tip}</div></div><input class="whoop-in" type="number" step="0.1" value="${e[f.k]||''}" placeholder="—" onchange="jSet(${weekNum},'${f.k}',this.value)"></div>`).join('');
  return `<div class="journal">
    <div class="jnl-hdr">
      <div><div class="jnl-lbl">WEEK ${weekNum} CHECK-IN</div><div class="jnl-ttl">Weight + Whoop Log</div></div>
      ${avg?`<div class="jnl-avg"><div style="font-size:8px;color:var(--muted);letter-spacing:2px">7-DAY AVG</div><div class="jnl-avg-n">${avg} lbs</div>${change!==null?`<div class="jnl-chg" style="color:${parseFloat(change)<0?'var(--green)':'var(--red)'}">${parseFloat(change)<0?'▼':'▲'} ${Math.abs(change)} lbs</div>`:''}</div>`:''}
    </div>
    <div class="jnl-sec"><div class="jnl-sec-lbl">DAILY FASTED WEIGHT (lbs)</div><div class="w-grid">${wInputs}</div></div>
    <div class="jnl-sec"><div class="jnl-sec-lbl">WHOOP SNAPSHOT</div>${wInputs2}</div>
    <div class="jnl-sec"><div class="jnl-sec-lbl">WEEKLY JOURNAL — patterns? weak spots? what clicked?</div><textarea class="jnl-notes" placeholder="Energy levels, sleep quality, what was hard, what felt great, questions for next week..." onchange="jSet(${weekNum},'notes',this.value)">${e.notes||''}</textarea></div>
    <div class="jnl-foot"><button class="jnl-save" id="jsave" onclick="saveJournalEntry(${weekNum})">SAVE CHECK-IN</button></div>
  </div>`;
}

// ── ACTIONS ─────────────────────────────────────────────────
function toggle(dayN,itemId){const k=`${dayN}_${itemId}`;S.checked[k]=!S.checked[k];scheduleSave();render();}
function prevDay(){if(S.dayIdx>0){S.dayIdx--;S.tab='checklist';render();window.scrollTo(0,0);}}
function nextDay(){if(S.dayIdx<29){S.dayIdx++;S.tab='checklist';render();window.scrollTo(0,0);}}
function gotoDay(i){S.dayIdx=i;S.showCal=false;S.tab='checklist';render();window.scrollTo(0,0);}
function toggleCal(){S.showCal=!S.showCal;render();}
function setTab(t){S.tab=t;render();}

function setWeight(dayN,ex,field,val){
  const dk=`day_${dayN}`;
  if(!S.weights[dk])S.weights[dk]={};
  if(!S.weights[dk][ex])S.weights[dk][ex]={};
  S.weights[dk][ex][field]=val;
  scheduleSave();
}
function addFood(dayN){
  const t=document.getElementById('f-time')?.value||'';
  const cat=document.getElementById('f-cat')?.value||'';
  const food=document.getElementById('f-food')?.value||'';
  const note=document.getElementById('f-note')?.value||'';
  if(!food.trim())return;
  const dk=`day_${dayN}`;
  if(!S.food[dk])S.food[dk]=[];
  S.food[dk].push({time:t,cat,food:food.trim(),note:note.trim()});
  scheduleSave();render();
}
function deleteFood(dayN,idx){
  const dk=`day_${dayN}`;
  if(S.food[dk])S.food[dk].splice(idx,1);
  scheduleSave();render();
}
function setMiss(dayN,key,val){const dk=`day_${dayN}`;if(!S.misses[dk])S.misses[dk]={};S.misses[dk][key]=val;}
function saveMiss(dayN,key,btn){const dk=`day_${dayN}`;if(!S.misses[dk])S.misses[dk]={};const ta=btn.previousElementSibling;if(ta)S.misses[dk][key]=ta.value;scheduleSave();btn.textContent='SAVED ✓';btn.className='miss-save saved';}
function saveNote(dayN){const val=document.getElementById('day-notes')?.value||'';S.notes[`day_${dayN}`]=val;scheduleSave();const btn=event.target;btn.textContent='SAVED ✓';btn.style.background='var(--green)';setTimeout(()=>{btn.textContent='SAVE NOTES';btn.style.background='';},2000);}
function jSet(week,field,val){const k=`week_${week}`;if(!S.journal[k])S.journal[k]={};S.journal[k][field]=val;}
function saveJournalEntry(week){LS.set('kl_journal',S.journal);const btn=document.getElementById('jsave');if(btn){btn.textContent='SAVED ✓';btn.className='jnl-save saved';setTimeout(()=>{if(btn){btn.textContent='SAVE CHECK-IN';btn.className='jnl-save';}},2000);}}

// ── INIT ────────────────────────────────────────────────────
render();
</script>
</body>
</html>
